name: Build and Deploy Multi-AI Agent

on:
  push:
    branches:
      - main  # Trigger on push to main
  pull_request:
    branches:
      - main  # Trigger on PR to main
  workflow_dispatch:  # Allow manual triggering from the Actions tab

concurrency:
  group: "deploy"
  cancel-in-progress: false  # Allow running concurrent deployments without cancellation

env:
  PYTHON_VERSION: 3.11.4  # Python version for your project
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0

jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Checkout the repository code

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}  # Ensure Python version matches

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Install dependencies listed in requirements.txt

      - name: Run Multi-AI Agent Script
        env:
          GOOGLE_API_KEY: ${{ github.secrets.GOOGLE_API_KEY }}  # Set API key from secrets
        run: python agent.py  # Run the main script

      - name: Create static build for GitHub Pages
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          echo "Build completed on $(date)" > _site/build-info.txt
          echo "Build Version: ${{ env.BUILD_VERSION }}" >> _site/build-info.txt
          echo "Commit SHA: ${{ github.sha }}" >> _site/build-info.txt

      - name: Upload Artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages  # Name of the artifact for GitHub Pages
          path: _site  # Path where your build/output files are located

  # Deploy Job
  deploy:
    needs: build  # Ensure the "build" job runs first
    runs-on: ubuntu-latest

    permissions:
      pages: write  # Ensure we have permission to deploy to GitHub Pages
      id-token: write  # Allow ID token access for deployment verification

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5  # Configure GitHub Pages for deployment

      - name: Deploy to GitHub Pages 🚀
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'  # Deploy on push to main or manually triggered
        id: deployment
        uses: actions/deploy-pages@v4  # Action to deploy to GitHub Pages

      - name: Output Deployment URL
        run: |
          echo "Deployed successfully! View at: ${{ steps.deployment.outputs.page_url }}"  # Output the URL to view your deployed content
