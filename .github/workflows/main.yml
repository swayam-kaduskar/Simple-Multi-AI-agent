name: Build and Deploy Multi-AI Agent

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

env:
  PYTHON_VERSION: 3.11.4
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0

jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify agent.py syntax
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python -m py_compile agent.py
        echo "agent.py syntax is valid"

    - name: Create static build for GitHub Pages
      run: |
        mkdir -p _site
        cp index.html _site/index.html
        echo "Build completed on $(date)" > _site/build-info.txt
        echo "Build Version: ${{ env.BUILD_VERSION }}" >> _site/build-info.txt
        echo "Commit SHA: ${{ github.sha }}" >> _site/build-info.txt

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        name: github-pages
        path: _site

  # Deploy Job
  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Deploy to GitHub Pages 🚀
      if: github.event_name == 'push'
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Output Deployment URL
      run: |
        echo "Deployed successfully! View at: ${{ steps.deployment.outputs.page_url }}"